<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snack Store</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>Snack Store <span class="cash-only">CASH ONLY</span></header>

<div class="main-container">
    <div class="store-container">
        <div class="item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Dr_Pepper_Dose_2024.jpg/250px-Dr_Pepper_Dose_2024.jpg" alt="Dr Pepper">
            <h3>Dr Pepper</h3>
            <p>NT$30</p>
            <div class="quantity">
                <input type="number" id="input-Dr Pepper" min="1" value="1">
                <button class="add-btn" onclick="addToCartWithInput('Dr Pepper', 30)">Add</button>
            </div>
            <div style="margin-top:10px;font-weight:bold">In cart: <span id="qty-Dr Pepper">0</span></div>
        </div>

        <div class="item">
            <img src="https://images.cdn.saveonfoods.com/detail/00074410700799.jpg" alt="Chicken Noodle Snack">
            <h3>Chicken Noodle Snack</h3>
            <p>NT$25</p>
            <div class="quantity">
                <input type="number" id="input-Chicken Noodle Snack" min="1" value="1">
                <button class="add-btn" onclick="addToCartWithInput('Chicken Noodle Snack', 25)">Add</button>
            </div>
            <div style="margin-top:10px;font-weight:bold">In cart: <span id="qty-Chicken Noodle Snack">0</span></div>
        </div>

        <div class="item">
            <div class="bundle-images">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Dr_Pepper_Dose_2024.jpg/250px-Dr_Pepper_Dose_2024.jpg" alt="Dr Pepper">
                <img src="https://images.cdn.saveonfoods.com/detail/00074410700799.jpg" alt="Chicken Noodle Snack">
            </div>
            <h3>Bundle Pack</h3>
            <p>NT$50</p>
            <div class="quantity">
                <input type="number" id="input-Bundle Pack" min="1" value="1">
                <button class="add-btn" onclick="addToCartWithInput('Bundle Pack', 50)">Add</button>
            </div>
            <div style="margin-top:10px;font-weight:bold">In cart: <span id="qty-Bundle Pack">0</span></div>
        </div>

        <div class="item">
            <img src="https://i.ebayimg.com/images/g/WboAAOSwPhBoI-cE/s-l1200.jpg" alt="Chocolate">
            <h3>Chocolate</h3>
            <p>NT$20</p>
            <div class="quantity">
                <input type="number" id="input-Chocolate" min="1" value="1">
                <button class="add-btn" onclick="addToCartWithInput('Chocolate', 20)">Add</button>
            </div>
            <div style="margin-top:10px;font-weight:bold">In cart: <span id="qty-Chocolate">0</span></div>
        </div>
    </div>

    <div class="cart-panel">
        <div class="cart-header">Your Cart</div>
        <div id="cart-items"></div>
        <div class="cart-total">Total: NT$<span id="total">0</span></div>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>
</div>

<!-- Hidden form for FormSubmit -->
<form id="orderForm" action="https://formsubmit.co/charlie2011.ting@gmail.com" method="POST" style="display:none;">
    <input type="hidden" name="_subject" id="emailSubject">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="box">
    <input type="text" name="Order Details" id="orderDetails">
    <input type="text" name="Total" id="orderTotal">
</form>

<script src="script.js"></script>
</body>
</html>
