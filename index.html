<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snack Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Snack Store</h1>

<input type="text" id="customerName" placeholder="Enter your name">

<div class="menu">
    <div class="item">
        <h3>Dr Pepper</h3>
        <p>NT$25</p>
        <input id="input-Dr Pepper" type="number" value="1" min="1">
        <button onclick="addToCartWithInput('Dr Pepper', 25)">Add</button>
        <span>In cart: <span id="qty-Dr Pepper">0</span></span>
    </div>

    <div class="item">
        <h3>Chicken Noodle Snack</h3>
        <p>NT$30</p>
        <input id="input-Chicken Noodle Snack" type="number" value="1" min="1">
        <button onclick="addToCartWithInput('Chicken Noodle Snack', 30)">Add</button>
        <span>In cart: <span id="qty-Chicken Noodle Snack">0</span></span>
    </div>

    <div class="item">
        <h3>Bundle Pack</h3>
        <p>NT$50</p>
        <input id="input-Bundle Pack" type="number" value="1" min="1">
        <button onclick="addToCartWithInput('Bundle Pack', 50)">Add</button>
        <span>In cart: <span id="qty-Bundle Pack">0</span></span>
    </div>

    <div class="item">
        <h3>Chocolate</h3>
        <p>NT$20</p>
        <input id="input-Chocolate" type="number" value="1" min="1">
        <button onclick="addToCartWithInput('Chocolate', 20)">Add</button>
        <span>In cart: <span id="qty-Chocolate">0</span></span>
    </div>
</div>

<h2>Cart</h2>
<div id="cart-items"></div>

<h3>Total: NT$<span id="total">0</span></h3>

<button onclick="checkout()">Checkout</button>

<!-- FormSubmit Form -->
<form id="orderForm" action="https://formsubmit.co/YOUR-EMAIL-HERE" method="POST">
    <input type="hidden" name="_subject" id="emailSubject">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input type="hidden" name="Customer Name" id="customerNameField">
    <textarea name="Order Details" id="orderDetails" hidden></textarea>
    <input type="hidden" name="Total" id="orderTotal">
</form>

<script src="script.js"></script>

</body>
</html>
